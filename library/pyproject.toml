# ============================================================================ #
# BUILD SYSTEM CONFIGURATION                                                   #
# ============================================================================ #
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/physicalai"]

# ============================================================================ #
# PROJECT CONFIGURATION                                                        #
# ============================================================================ #
[project]
name = "physicalai-train"
version = "0.1.0"
requires-python = ">=3.12, <3.15"
description = "A package for training vision-action models"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Intel Open Edge Platform" }]
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pillow",
    "lightning",
    "lightning-utilities",
    "lerobot[dataset]==0.6.0",
    "gymnasium>=0.29.1",
    "gym-pusht>=0.1.5",
    "pymunk>=6.6.0,<7.0.0",
    "onnx",
    "openvino>=2026.0",
    "openvino_tokenizers>=2026.0",
    "onnxscript",
    "jsonargparse[signatures]>=4.27.0", # This could be extra
    "pydantic",                         # This could be extra
    # Provides the `physicalai` CLI host and the `physicalai.cli._spec`
    # SubcommandSpec contract that the studio subcommands plug into. Must be a
    # release that ships the CLI host; older runtimes lack `physicalai.cli`.
    "physicalai>=0.1.0",
]

[project.optional-dependencies]
# PyTorch dependency groups
cpu = ["torch", "torchvision"]
cu128 = ["torch", "torchvision"]
xpu = [
    "torch",
    "torchvision",
    "pytorch-triton-xpu ; sys_platform == 'linux' or sys_platform == 'win32'",
]
# Testing dependencies
tests = [
    "httpx",
    "pytest",
    "pytest-mock",
    "pytest-examples>=0.0.13",
    "mypy",
    "diffusers>=0.38.0",
]
libero = ["hf-libero>=0.1.3,<0.2.0"]
diffusion = ["diffusers>=0.38.0"]

# VLA Policy dependencies - these are heavy models with specific requirements
# Install with: pip install physicalai-train[groot]

# Physical Intelligence Pi0/Pi0.5 foundation model
# Requires PaliGemma backbone + Gemma action expert
# Supports LoRA fine-tuning for efficient adaptation
pi0 = [
    "transformers>=5.5.0,<5.6.0",
    "peft>=0.13.0,<1.0.0",
    "safetensors>=0.4.3,<1.0.0",
    "Pillow>=10.0.0,<13.0.0",
    "sentencepiece<=0.2.1",
]
pi05 = ["physicalai-train[pi0]"]

# NVIDIA GR00T-N1 foundation model
# Requires ~24GB+ GPU memory for training, supports LoRA fine-tuning
# Note: transformers>=4.54.0 required for _prepare_image_like_inputs fix
groot = [
    "transformers>=5.5.0,<5.6.0",
    "peft>=0.13.0,<1.0.0",
    "diffusers>=0.38.0",
    "dm-tree>=0.1.8,<1.0.0",
    "timm>=1.0.0,<1.1.0",
    "safetensors>=0.4.3,<1.0.0",
    "Pillow>=10.0.0,<13.0.0",
    "decord>=0.6.0,<1.0.0; (platform_machine == 'AMD64' or platform_machine == 'x86_64')",
    "ninja>=1.11.1,<2.0.0",
]

# SmolVLA foundation model
smolvla = [
    "transformers>=5.5.0,<5.6.0",
    "num2words>=0.5.14,<0.6.0",
    "safetensors>=0.4.3,<1.0.0",
]

# ExecuTorch runtime for edge/mobile deployment
executorch = ["executorch>=1.1.0"]

# ExecuTorch with OpenVINO delegate (requires nncf for export)
executorch-openvino = ["executorch>=1.1.0", "nncf>=3.0.0"]

# All optional dependencies
all = [
    "physicalai-train[tests]",
    "physicalai-train[libero]",
    "physicalai-train[pi0]",
    "physicalai-train[pi05]",
    "physicalai-train[groot]",
    "physicalai-train[smolvla]",
]

# Contribute Torch and ExecuTorch as inference backends to the registry
# in `physicalai.inference.adapters`.  The target callable performs only
# lightweight lazy registration — torch/executorch are imported only on
# first use.
[project.entry-points."physicalai.cli.subcommands"]
fit = "physicalai.cli.fit:register"
validate = "physicalai.cli.validate:register"
test = "physicalai.cli.test:register"
predict = "physicalai.cli.predict:register"
benchmark = "physicalai.cli.benchmark:register"
export = "physicalai.cli.export:register"

[project.entry-points."physicalai.inference.adapters"]
physicalai-train = "physicalai.inference.adapters._register:register"

[project.urls]
Homepage = "https://github.com/open-edge-platform/physical-ai-studio/tree/main/library"
Documentation = "https://github.com/open-edge-platform/physical-ai-studio/blob/main/library/docs/index.md"
Repository = "https://github.com/open-edge-platform/physical-ai-studio.git"
Issues = "https://github.com/open-edge-platform/physical-ai-studio/issues"

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pyrefly>=0.18.0",
    "ruff>=0.14.14",
    "diffusers>=0.38.0",
]


# ============================================================================ #
# UV CONFIGURATION                                                             #
# ============================================================================ #
[tool.uv]
exclude-newer = "7 days"
index-strategy = "unsafe-best-match"
override-dependencies = [
    # executorch>=1.1.0 requires pytest<9.0 (its own test-suite constraint),
    # Safe to override because executorch
    # production code does not import pytest at runtime.
    "pytest>=9.0.3",
    # LeRobot 0.6.0 keeps diffusers in optional extras; keep an explicit floor for CVE-2026-44827 fix
    "diffusers>=0.38.0",
]


conflicts = [
    [{ extra = "cpu" }, { extra = "cu128" }, { extra = "xpu" }],
    [{ extra = "executorch" }, { extra = "xpu" }],
    [{ extra = "executorch-openvino" }, { extra = "xpu" }],
]

# PyTorch index configuration
[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-xpu"
url = "https://download.pytorch.org/whl/xpu"
explicit = false

# PyTorch sources configuration
[tool.uv.sources]
physicalai = { git = "https://github.com/openvinotoolkit/physicalai.git", rev = "08fcd96389fa9e326946df6affc5c19c4c731633" }
torch = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-xpu", extra = "xpu" },
]
torchvision = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-xpu", extra = "xpu" },
]

pytorch-triton-xpu = [{ index = "pytorch-xpu", extra = "xpu" }]
triton-xpu = { index = "pytorch-xpu" }


# ============================================================================ #
# MYPY CONFIGURATION                                                           #
# ============================================================================ #
# Inherits from root pyproject.toml, add library-specific overrides here
[tool.mypy]
ignore_missing_imports = true
show_error_codes = true
explicit_package_bases = true

[tool.pyrefly]
search-path = ["src"]
project-includes = ["src"]
baseline = "pyrefly-baseline.json"
project-excludes = [
    ".venv/**",
    "notebooks/**",
    # robocasa is an optional dependency installed via `library/scripts/benchmark/install_robocasa.sh`
    # into a dedicated `.venv-robocasa` — it is intentionally absent from the main `.venv`
    # because its dep graph is unsolvable in a single uv resolve (lerobot==0.3.3 /
    # robosuite / tianshou pin conflicts). Pyrefly runs against the main `.venv`, so it
    # cannot resolve the robocasa modules. The imports are guarded by `_ROBOCASA_AVAILABLE`
    # at runtime; `TYPE_CHECKING` provides type info to mypy/pyrefly when robocasa IS
    # installed. Exclude the file here to avoid spurious missing-import errors in CI.
    "src/physicalai/gyms/robocasa.py",
    "src/physicalai/policies/pi05/pi_gemma.py",
    "src/physicalai/policies/groot/components/backbone.py",
]


# ============================================================================ #
# RUFF CONFIGURATION                                                           #
# ============================================================================ #
[tool.ruff]
# Extend shared configuration from root
extend = "../pyproject.toml"

# Library-specific source directories
src = ["src", "tests"]

# Library-specific excludes (in addition to root excludes)
extend-exclude = [
    "docs",
    "examples",
    "tests",
    "notebooks", # Jupyter notebooks have different style requirements
]

[tool.ruff.lint]
ignore = []


# ============================================================================ #
# BANDIT CONFIGURATION                                                         #
# ============================================================================ #
[tool.bandit]
skips = ["B101"]
exclude_dirs = ["tests"]


# ============================================================================ #
# PYTEST CONFIGURATION                                                         #
# ============================================================================ #
[tool.pytest.ini_options]
addopts = ["--strict-markers", "--strict-config", "--showlocals", "-ra"]
testpaths = "tests"
pythonpath = "src"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "requires_download: marks tests that require downloading external datasets",
    "integration: marks tests as integration tests",
]


# ============================================================================ #
# COVERAGE CONFIGURATION                                                       #
# ============================================================================ #
[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "pass",
    "raise ImportError",
    "raise ValueError",
    "except ImportError:",
]

[tool.coverage.paths]
source = ["src"]
