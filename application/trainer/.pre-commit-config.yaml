# Trainer-specific pre-commit configuration for prek workspace mode
# This config applies only to files in application/trainer/
#
# Kept in sync with application/backend/.pre-commit-config.yaml (the
# canonical setup for Python apps in this repo). The only intentional
# difference is the omission of the backend's Alembic migration check,
# which is specific to the backend's database schema.

repos:
  # ========================================================================== #
  # PYTHON CHECKS                                                              #
  # ========================================================================== #
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: debug-statements
      - id: check-ast

  # ========================================================================== #
  # PYTHON LINTING & FORMATTING                                                #
  # ========================================================================== #
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.11.11"
    hooks:
      # Run the linter with fixes (uses [tool.ruff] from pyproject.toml)
      - id: ruff
        args: ["--config=pyproject.toml", "--fix"]
      # Run the formatter (uses [tool.ruff] from pyproject.toml)
      - id: ruff-format
        args: ["--config=pyproject.toml"]

  # ========================================================================== #
  # PYTHON TYPE CHECKING                                                       #
  # ========================================================================== #
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.15.0"
    hooks:
      - id: mypy
        # Uses [tool.mypy] from pyproject.toml
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - types-PyYAML
          - types-setuptools
          - types-aiofiles

  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 0.58.0
    hooks:
      - id: pyrefly-check
        name: Pyrefly (type checking)
        entry: uv run pyrefly check
        language: system
        pass_filenames: false

  # ========================================================================== #
  # SECURITY - SECRET DETECTION                                                #
  # ========================================================================== #
  # gitleaks detects secrets (API keys, tokens, credentials) in code.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ========================================================================== #
  # DEPENDENCY LOCKFILE CHECKS                                                 #
  # ========================================================================== #
  - repo: local
    hooks:
      - id: check-uv-lock
        name: Check uv.lock is up to date
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
