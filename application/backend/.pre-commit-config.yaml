# Backend-specific pre-commit configuration for prek workspace mode
# This config applies only to files in application/backend/
#
# This is the canonical Python app setup for this repo. Keep
# application/trainer/.pre-commit-config.yaml in sync with this file
# (the Alembic migration check below is the one intentional exception,
# since it is specific to the backend's database schema).

repos:
  # ========================================================================== #
  # PYTHON CHECKS                                                              #
  # ========================================================================== #
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: debug-statements
      - id: check-ast

  # ========================================================================== #
  # PYTHON LINTING & FORMATTING                                                #
  # ========================================================================== #
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "v0.11.11"
    hooks:
      # Run the linter with fixes (uses [tool.ruff] from pyproject.toml)
      - id: ruff
        args: ["--config=pyproject.toml", "--fix"]
      # Run the formatter (uses [tool.ruff] from pyproject.toml)
      - id: ruff-format
        args: ["--config=pyproject.toml"]

  # ========================================================================== #
  # PYTHON TYPE CHECKING                                                       #
  # ========================================================================== #
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.15.0"
    hooks:
      - id: mypy
        # Uses [tool.mypy] from pyproject.toml
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - types-PyYAML
          - types-setuptools
          - types-aiofiles

  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 1.1.1
    hooks:
      - id: pyrefly-check
        name: Pyrefly (type checking)
        entry: uv run pyrefly check
        language: system
        pass_filenames: false

  # ========================================================================== #
  # SECURITY - SECRET DETECTION                                                #
  # ========================================================================== #
  # gitleaks detects secrets (API keys, tokens, credentials) in code.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ========================================================================== #
  # DEPENDENCY LOCKFILE CHECKS                                                 #
  # ========================================================================== #
  - repo: local
    hooks:
      - id: check-uv-lock
        name: Check uv.lock is up to date
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

  # ========================================================================== #
  # ALEMBIC MIGRATION CHECKS                                                   #
  # ========================================================================== #
  - repo: local
    hooks:
      - id: check-alembic-heads
        name: Check for multiple Alembic migration heads
        entry: bash scripts/check_alembic_heads.sh
        language: system
        pass_filenames: false
        files: 'src/alembic/versions/.*\.py$'
