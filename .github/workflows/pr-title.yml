name: PR Title

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions: {} # No permissions by default on workflow level

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            perf
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            The subject (after "type: ") cannot be empty.
          # Don't validate PR body or commits, only the title
          validateSingleCommit: false
          ignoreLabels: |
            skip-conventional-commits
