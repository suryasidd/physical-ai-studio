# Security scan workflow for the Geti project

# This workflow is triggered on schedule, workflow_dispatch, and pushes to develop and release branches.
# It performs comprehensive security scanning using multiple tools to identify vulnerabilities,
# secrets, configuration issues, and code quality problems across the entire codebase.
# It also scans GitHub Actions workflows for potential security issues.

# Key Features:
# - Scans GitHub Actions workflows for security vulnerabilities (Zizmor)
# - Performs static security analysis of Python code (Bandit)
# - Scans for vulnerabilities, secrets, and misconfigurations (Trivy)
# - Conducts semantic code analysis for security issues (Semgrep)

# Process Stages:
# 1. Scan GitHub Actions workflows with Zizmor
# 2. Analyze Python code security with Bandit
# 3. Perform filesystem security scan with Trivy
# 4. Run semantic security analysis with Semgrep
# 5. Scan container images (latest available version) with Trivy

# Security Tools:
# - Zizmor: GitHub Actions workflow security scanner
# - Bandit: Python security linter
# - Trivy: Vulnerability and misconfiguration scanner
# - Semgrep: Static analysis tool for finding bugs and security issues

name: "Security scan"

on:
  schedule:
    # Run security checks every day at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - releases/**
  pull_request:
    branches:
      - main
      - releases/**

permissions: {} # No permissions by default

jobs:
  zizmor-scan:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write # Needed to upload the results to code-scanning dashboard
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            releases.astral.sh:443

      - &checkout
        name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Zizmor scan
        uses: open-edge-platform/geti-ci/actions/zizmor@0bed754fc7db24b5f9f15e7ead2eb4acdb0c7263 # zizmor/v0.1.2
        with:
          scan-scope: ${{ github.event_name == 'pull_request' && 'changed' || 'all' }}
          severity-level: ${{ github.event_name == 'pull_request' && 'MEDIUM' || 'LOW' }}
          confidence-level: ${{ github.event_name == 'pull_request' && 'MEDIUM' || 'LOW' }}
          fail-on-findings: ${{ github.event_name == 'pull_request' && 'true' || 'false' }} # reports only

  bandit-scan:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write # Needed to upload the results to code-scanning dashboard
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - *checkout

      - name: Run Bandit scan
        uses: open-edge-platform/geti-ci/actions/bandit@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          scan-scope: ${{ github.event_name == 'pull_request' && 'changed' || 'all' }}
          severity-level: ${{ github.event_name == 'pull_request' && 'MEDIUM' || 'LOW' }}
          confidence-level: ${{ github.event_name == 'pull_request' && 'MEDIUM' || 'LOW' }}
          config_file: ".github/bandit_config.yml"
          fail-on-findings: ${{ github.event_name == 'pull_request' && 'true' || 'false' }} # reports only

  trivy-scan:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write # Needed to upload the results to code-scanning dashboard
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            check.trivy.dev:443
            files.pythonhosted.org:443
            get.trivy.dev:443
            github.com:443
            mirror.gcr.io:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Trivy scan
        uses: open-edge-platform/geti-ci/actions/trivy@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          scan_type: "fs"
          scan-scope: all
          severity: "LOW"
          scanners: "secret,config"
          format: "sarif"
          timeout: "15m"
          ignore_unfixed: "false"

  semgrep-scan:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write # Needed to upload the results to code-scanning dashboard
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            semgrep.dev:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Semgrep scan
        uses: open-edge-platform/geti-ci/actions/semgrep@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          scan-scope: ${{ github.event_name == 'pull_request' && 'changed' || 'all' }}
          severity: ${{ github.event_name == 'pull_request' && 'HIGH' || 'LOW' }}
          fail-on-findings: ${{ github.event_name == 'pull_request' && 'true' || 'false' }} # reports only

  trivy-image-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
    strategy:
      matrix:
        ai-device: [cpu, cuda, xpu]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            check.trivy.dev:443
            deb.debian.org:80
            developer.download.nvidia.com:443
            dl-cdn.alpinelinux.org:443
            download-r2.pytorch.org:443
            files.pythonhosted.org:443
            get.trivy.dev:443
            ghcr.io:443
            ghcr1production.blob.core.windows.net:443
            github.com:443
            mirror.gcr.io:443
            pkg-containers.githubusercontent.com:443
            ppa.launchpadcontent.net:443
            production.cloudflare.docker.com:443
            raw.githubusercontent.com:443
            registry.npmjs.org:443
            registry-1.docker.io:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443
            storage.geti.intel.com:443

      - name: Run container image scan (${{ matrix.ai-device }})
        uses: open-edge-platform/geti-ci/actions/trivy@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          artifact-name: "trivy-scan-container-${{ matrix.ai-device }}"
          scan_type: "image"
          scan_target: "ghcr.io/open-edge-platform/physical-ai-studio-${{ matrix.ai-device }}:main"
          scan-scope: all
          severity: "LOW"
          scanners: "vuln,secret,config"
          format: "table"
          timeout: "15m"
          ignore_unfixed: "true"

  dast-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
    strategy:
      matrix:
        ai-device: [cpu]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: false
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            ghcr.io:443
            ghcr1production.blob.core.windows.net:443
            mirror.gcr.io:443
            pkg-containers.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            releases.astral.sh:443

      - name: Runner cleanup
        uses: open-edge-platform/geti-ci/actions/cleanup-runner@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          type: "initial"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Pull container image for ${{ matrix.ai-device }}
        env:
          DEVICE: ${{ matrix.ai-device }}
        run: |
          IMAGE_NAME="ghcr.io/open-edge-platform/physical-ai-studio-${DEVICE}:main"
          echo "Pulling image: $IMAGE_NAME"
          docker pull "$IMAGE_NAME"

      - name: Run the docker image
        id: run-image
        env:
          DEVICE: ${{ matrix.ai-device }}
        run: |
          CONTAINER_NAME="physical-ai-studio-${DEVICE}"
          IMAGE_NAME="ghcr.io/open-edge-platform/physical-ai-studio-${DEVICE}:main"

          # Start the container in detached mode
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p 7860:7860 \
            "$IMAGE_NAME"

          TEST_URL="localhost:7860"
          # Wait for container to be ready (max 60 seconds)
          echo "Waiting for container to be ready..."
          HEALTH_OK=false
          for i in {1..12}; do
              if curl -sf $TEST_URL/health > /dev/null 2>&1; then
                  echo "✅ Health check passed!"
                  HEALTH_OK=true
                  break
              fi
              echo "Attempt $i/12 - waiting 5 seconds..."
              sleep 5
          done

          if [[ "$HEALTH_OK" != "true" ]]; then
              echo "❌ Health check failed after 60 seconds"
              exit 1
          fi

          echo "CONTAINER_NAME=${CONTAINER_NAME}" >> $GITHUB_ENV

      - name: Run ZAP API Scan
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d # v0.10.0
        with:
          target: "http://localhost:7860/api/openapi.json"
          format: "openapi"
          cmd_options: "-a"
          allow_issue_writing: false
          fail_action: false
          artifact_name: zapapi

      - name: Run Schemathesis Scan
        uses: schemathesis/action@806cace2053cbbac93188e1281ff7da415643160 # v3
        continue-on-error: true
        with:
          schema: "http://localhost:7860/api/openapi.json"
          args: >-
            --continue-on-failure
            --report-dir schemathesis-report
            --report junit
            --report-junit-path schemathesis-report/junit.xml

      - name: Upload Schemathesis report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: schemathesis-report-${{ matrix.ai-device }}
          path: schemathesis-report/junit.xml

      - name: Re-check container health after testing
        if: always()
        run: |
          TEST_URL="localhost:7860"

          echo "Running post-scan health check..."
          if curl -sf $TEST_URL/health > /dev/null 2>&1; then
              echo "✅ Post-scan health check passed!"
          else
              echo "❌ Post-scan health check failed"
              echo "=== Container logs ==="
              docker logs "$CONTAINER_NAME" || true
              exit 1
          fi

      - name: Save container logs to file
        if: always()
        run: |
          mkdir -p dast-scan-logs
          if [ -n "$CONTAINER_NAME" ]; then
            echo "Saving logs for container $CONTAINER_NAME"
            docker logs "$CONTAINER_NAME" > dast-scan-logs/container-$CONTAINER_NAME.log 2>&1 || true
          else
            echo "CONTAINER_NAME not set" > dast-scan-logs/container-lookup.log
          fi

      - name: Upload container logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: container-logs
          path: dast-scan-logs/

      - name: Stop and Cleanup Container
        if: always()
        run: |
          if [ -n "${CONTAINER_NAME}" ]; then
            echo "Stopping container ${CONTAINER_NAME}..."
            docker stop "${CONTAINER_NAME}" || true
          fi
