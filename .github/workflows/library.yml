name: Library

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: # run on request (no need for PR)

permissions: {} # No permissions by default on workflow level

concurrency:
  group: library-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    permissions:
      contents: read
    steps:
      - &harden-runner
        name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: false
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            azure.archive.ubuntu.com:80
            cas-server.xethub.hf.co:443
            dl.google.com:443
            download.pytorch.org:443
            download-r2.pytorch.org:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            huggingface.co:443
            github.com:443
            packages.microsoft.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443
            transfer.xethub.hf.co:443
            us.aws.cdn.hf.co:443

      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: open-edge-platform/geti-ci/actions/check-paths@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          files_yaml: |
            test:
              - library/**
              - physicalai/**
              - .github/**

  code-quality:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
    steps:
      - *harden-runner

      - *checkout

      - &set-up-python
        name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "./library/.python-version"

      - &set-up-uv
        name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.4"

      - name: Run prek
        uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2
        with:
          extra-args: --all-files
          working-directory: library

  unit-tests:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
    steps:
      - *harden-runner

      - *checkout

      - *set-up-python

      - name: Install system dependencies for headless rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev

      - *set-up-uv

      - name: Verify lock file
        working-directory: library
        run: uv lock --check

      - name: Install dependencies
        working-directory: library
        run: |
          # Note: We install 'tests', 'pi0', and 'libero' extras, not 'groot' which requires CUDA/flash-attn
          uv sync --frozen --extra tests --extra pi0 --extra libero --extra smolvla --extra cpu

      - name: Run python unit tests
        working-directory: library
        env:
          # Headless rendering for MuJoCo/OpenGL (must be set before any imports)
          MUJOCO_GL: egl
          PYOPENGL_PLATFORM: egl
        run: |
          uv run --no-sync pytest tests/unit

  required-check:
    name: Required Check library
    needs:
      - check-paths
      - code-quality
      - unit-tests
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - *harden-runner

      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
