name: Docker Build

on:
  pull_request:
    branches: [main]

permissions: {} # No permissions by default on workflow level

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    permissions:
      contents: read
    steps:
      - &harden-runner
        name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: false
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            deb.debian.org:80
            developer.download.nvidia.com:443
            download.pytorch.org:443
            download-r2.pytorch.org:443
            files.pythonhosted.org:443
            ghcr.io:443
            ghcr1production.blob.core.windows.net:443
            github.com:443
            index.crates.io:443
            pkg-containers.githubusercontent.com:443
            ppa.launchpadcontent.net:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            pypi.org:443
            registry.npmjs.org:443
            registry-1.docker.io:443
            static.crates.io:443
            static.rust-lang.org:443
            www.google-analytics.com:443

      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: open-edge-platform/geti-ci/actions/check-paths@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          files_yaml: |
            test:
              - library/**
              - physicalai/**
              - application/**
              - .github/actions/docker-build/**
              - .github/workflows/docker-build.yml

  build:
    name: Build (${{ matrix.device }})
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read # Checkout code
      packages: write # Push/pull registry build cache on GHCR
      pull-requests: write # Post image size comment

    strategy:
      fail-fast: false
      matrix:
        device: [cpu, xpu, cuda]

    steps:
      - *harden-runner

      - *checkout

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/open-edge-platform/physical-ai-studio-${{ matrix.device }}
          tags: |
            type=sha
            type=ref,event=pr

      - name: Build Docker image
        id: docker_build
        uses: ./.github/actions/docker-build
        with:
          device: ${{ matrix.device }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Fork PRs cannot write packages to the upstream org, so disable
          # cache export to avoid 403 errors from GHCR.
          cache-write: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Smoke-test docker image
        env:
          IMAGE: ${{ steps.docker_build.outputs.image-name }}
          DEVICE: ${{ matrix.device }}
        working-directory: application/docker
        run: |
          SERVICE_NAME="physical-ai-studio-${DEVICE}"
          
          # CUDA requires GPU hardware, test with docker run instead of compose
          # CPU and XPU test via compose to validate the full deployment config
          if [ "${DEVICE}" = "cuda" ]; then
            docker run -d --name "${SERVICE_NAME}" -p 7860:7860 "${IMAGE}"
            CLEANUP_CMD="docker rm -f ${SERVICE_NAME}"
          else
            echo "Testing ${IMAGE} via docker compose..."

            # Extract registry and tag from the built image name
            # IMAGE format: registry/org/name:tag
            # Example: ghcr.io/open-edge-platform/physical-ai-studio-cpu:sha-abc123
            REGISTRY=$(echo "${IMAGE}" | sed 's|\(.*\)/[^/]*$|\1/|')
            IMAGE_TAG=$(echo "${IMAGE}" | sed 's|.*:||')

            # Create minimal .env for CI testing
            cat > .env << EOF
          HOST=0.0.0.0
          PORT=7860
          COMPOSE_PROFILES=${DEVICE}
          REGISTRY=${REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          # Use unique numeric GIDs to avoid group resolution issues
          DIALOUT_GID=1000
          PLUGDEV_GID=1001
          VIDEO_GID=1002
          RENDER_GID=1003
          EOF

            echo "Starting service ${SERVICE_NAME} via docker compose..."
            docker compose up -d
            CLEANUP_CMD="docker compose down -v"
          fi

          # Wait for health check to pass (compose) or /health endpoint (docker run)
          echo "Waiting for service to be ready..."
          for i in $(seq 1 30); do
            if [ "${DEVICE}" = "cuda" ]; then
              # For docker run, check the health endpoint directly
              if curl -sf http://localhost:7860/api/health > /dev/null 2>&1; then
                echo "Backend health check passed!"
                break
              fi
            else
              # For compose, check Docker's health status
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "${SERVICE_NAME}" 2>/dev/null || echo "starting")
              echo "Health status: ${STATUS}"
              if [ "${STATUS}" = "healthy" ]; then
                echo "Backend health check passed!"
                break
              fi
            fi

            if [ "$i" -eq 30 ]; then
              echo "Backend health check failed after 60 seconds."
              if [ "${DEVICE}" = "cuda" ]; then
                docker logs "${SERVICE_NAME}"
              else
                docker compose logs
              fi
              eval "${CLEANUP_CMD}"
              exit 1
            fi
            sleep 2
          done

          # Verify the UI is being served
          TEST_URL="http://localhost:7860"
          EXPECTED_TITLE="Physical AI Studio"
          echo "Checking HTML title..."

          HTML_CONTENT=$(curl -sf $TEST_URL)
          if echo "$HTML_CONTENT" | grep -q "<title>.*$EXPECTED_TITLE.*</title>"; then
            echo "✅ HTML title check passed - found: $EXPECTED_TITLE"
          else
            echo "❌ HTML title check failed - expected title '$EXPECTED_TITLE' not found"
            echo "Actual HTML content:"
            echo "$HTML_CONTENT"
            if [ "${DEVICE}" = "cuda" ]; then
              docker logs "${SERVICE_NAME}"
            else
              docker compose logs
            fi
            eval "${CLEANUP_CMD}"
            exit 1
          fi

          # Verify volumes were created (compose only)
          if [ "${DEVICE}" != "cuda" ]; then
            docker volume ls | grep physical-ai-studio-data || { echo "Data volume missing"; eval "${CLEANUP_CMD}"; exit 1; }
            docker volume ls | grep physical-ai-studio-storage || { echo "Storage volume missing"; eval "${CLEANUP_CMD}"; exit 1; }
            echo "Volumes created successfully"
          fi

          eval "${CLEANUP_CMD}"

      - name: Get Docker image size
        id: image_size
        env:
          IMAGE: ${{ steps.docker_build.outputs.image-name }}
        run: |
          # docker image inspect .Size may undercount with the docker buildx
          # driver because it only reports the diff/top-layer size.  Summing
          # all layer sizes via `docker history` gives the true uncompressed
          # on-disk total.
          SIZE_BYTES=$(docker history "${IMAGE}" --format '{{.Size}}' \
            | awk '
                /[0-9]+(\.[0-9]+)?[kKmMgG]?[bB]/ {
                  n = $1+0; unit = $1;
                  gsub(/[0-9.]+/, "", unit);
                  unit = toupper(unit);
                  if (unit == "KB") n *= 1024;
                  else if (unit == "MB") n *= 1024*1024;
                  else if (unit == "GB") n *= 1024*1024*1024;
                  total += n
                }
                END { printf "%d", total }
              ')
          SIZE_MB=$(awk "BEGIN {printf \"%.1f\", ${SIZE_BYTES} / 1024 / 1024}")
          SIZE_GB=$(awk "BEGIN {printf \"%.2f\", ${SIZE_BYTES} / 1024 / 1024 / 1024}")
          echo "bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "human=${SIZE_MB} MB (${SIZE_GB} GB)" >> "$GITHUB_OUTPUT"

      - name: Post image size comment
        # Skip this step for PRs from forks as the do not have write permissions
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEVICE: ${{ matrix.device }}
          SIZE_HUMAN: ${{ steps.image_size.outputs.human }}
        run: |
          MARKER="<!-- docker-image-size -->"
          HEADER="${MARKER}
          ### 🐳 Docker image sizes

          | Device | Size |
          |--------|------|"
          NEW_ROW="| \`${DEVICE}\` | ${SIZE_HUMAN} |"

          # Find the shared comment
          COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
          | head -n1)

          if [ -n "${COMMENT_ID}" ]; then
            # Read the current body, replace or append the device row
            EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" --jq .body)
            if echo "${EXISTING}" | grep -q "| \`${DEVICE}\`"; then
              BODY=$(echo "${EXISTING}" | sed "s/| \`${DEVICE}\` |.*/${NEW_ROW}/")
            else
              BODY="${EXISTING}
          ${NEW_ROW}"
            fi
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -f body="${BODY}"
          else
            BODY="${HEADER}
          ${NEW_ROW}"
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi

  required-check:
    name: Required Check docker-build
    needs:
      - check-paths
      - build
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
