name: UI
permissions: {} # No permissions by default on workflow level

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch: # run on request (no need for PR)

concurrency:
  group: ui-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    permissions:
      contents: read
    steps:
      - &harden-runner
        name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: false
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            azure.archive.ubuntu.com:80
            dl.google.com:443
            download.pytorch.org:443
            download-r2.pytorch.org:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            github.com:443
            github-cloud.githubusercontent.com:443
            nodejs.org:443
            packages.microsoft.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443

      - &checkout
        name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: open-edge-platform/geti-ci/actions/check-paths@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          files_yaml: |
            test:
              - application/ui/**
              - application/backend/**
              - .github/**

  generate-openapi-spec:
    name: Generate OpenAPI Spec
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read # to checkout code
    steps:
      - *harden-runner

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "./application/backend/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.4"

      - name: Install OpenCV dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        run: |
          uv lock --check
          uv sync --frozen --extra cpu

      - name: Get OpenAPI spec
        working-directory: application/backend
        run: |
          export PYTHONPATH=.
          uv run src/cli.py gen-api --target-path openapi-spec.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-spec
          path: application/backend/openapi-spec.json

  build:
    name: Build UI
    needs:
      - generate-openapi-spec
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read # to checkout code
    steps:
      - *harden-runner

      - *checkout

      - &setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version-file: application/ui/.nvmrc

      # `min-release-age` in application/ui/.npmrc requires npm >= 11.5.1.
      # Ensure a compatible npm is available regardless of the default npm
      # bundled with the pinned Node version.
      - &setup-compatible-npm
        name: Ensure npm supports min-release-age
        run: npm i -g npm@11.14.0

      - &install-dependencies
        name: Install dependencies
        working-directory: "application/ui"
        run: npm ci

      - &download-openapi-spec
        name: Download OpenAPI spec artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-spec
          path: application/ui/src/api

      - &build-openapi-types-definitions
        name: Build OpenAPI type definitions
        working-directory: "application/ui"
        run: npm run build:api

      - name: Build UI
        working-directory: "application/ui"
        run: npm run build

      - name: Compress build
        working-directory: "application/ui"
        run: tar -czf dist.tar.gz dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-dist
          path: "application/ui/dist.tar.gz"

  lint:
    name: Eslint checks
    needs:
      - generate-openapi-spec
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read # to checkout code
    steps:
      - *harden-runner

      - *checkout

      - *setup-node

      - *setup-compatible-npm

      - *install-dependencies

      - *download-openapi-spec

      - *build-openapi-types-definitions

      - name: Prettier
        working-directory: "application/ui"
        run: npm run format:check

      - name: Eslint
        working-directory: "application/ui"
        run: npm run lint

      - name: Eslint cyclic imports
        working-directory: "application/ui"
        run: npm run cyclic-deps-check

      - name: Typescript
        working-directory: "application/ui"
        run: npm run type-check

  unit-tests:
    name: Unit tests
    needs:
      - generate-openapi-spec
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read # to checkout code
    steps:
      - *harden-runner

      - *checkout

      - *setup-node

      - *setup-compatible-npm

      - *install-dependencies

      - *download-openapi-spec

      - *build-openapi-types-definitions

      - name: UI Unit tests
        working-directory: "application/ui"
        run: npm run test:unit

  playwright-tests:
    name: Playwright Tests
    needs:
      - build
      - generate-openapi-spec
    permissions:
      contents: read # to checkout code
    timeout-minutes: 60
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy@sha256:8a0360d39d1973be506dd59002904a774f6d697d4946c94063b3fd006461c8ff
    steps:
      - *harden-runner

      - *checkout

      - *setup-node

      - *setup-compatible-npm

      - *install-dependencies

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ui-dist
          path: "application/ui"

      - name: Unpack build
        working-directory: "application/ui"
        run: tar -xzf dist.tar.gz

      - *download-openapi-spec

      - *build-openapi-types-definitions

      - name: Run Playwright tests
        working-directory: "application/ui"
        run: npm run test:component -- --project "Component tests"

      - name: Upload blob report to GitHub Actions Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: application/ui/playwright-report/
          retention-days: 30

  required-check:
    name: Required Check ui
    needs:
      - check-paths
      - generate-openapi-spec
      - build
      - lint
      - unit-tests
      - playwright-tests
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - *harden-runner

      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
