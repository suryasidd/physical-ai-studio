name: Docker Build
description: >
  Build a Physical AI Studio Docker image for a given device target.
  Handles runner cleanup, Buildx setup, and the build itself.
  The caller is responsible for checkout, registry login, metadata/tagging,
  and any post-build steps (image signing).

inputs:
  device:
    description: "Build target device (cpu, xpu, or cuda)"
    required: true
  push:
    description: "Push the image to the registry (true/false)"
    required: false
    default: "false"
  tags:
    description: "Newline-separated image tags (from docker/metadata-action)"
    required: false
    default: ""
  labels:
    description: "Newline-separated image labels (from docker/metadata-action)"
    required: false
    default: ""
  cache-write:
    description: >
      Write build cache to the registry (true/false). Set to false for
      fork PRs where GITHUB_TOKEN cannot write to the org's packages.
    required: false
    default: "true"
  use-cache:
    description: >
      Enable build cache (true/false). Should be disabled for RC and release
      builds to ensure reproducibility and prevent cache poisoning attacks.
    required: false
    default: "true"

outputs:
  digest:
    description: "Image digest from docker/build-push-action"
    value: ${{ steps.build.outputs.digest }}
  image-name:
    description: "First tag of the built image (available only when not pushing)"
    value: ${{ steps.first-tag.outputs.name }}

runs:
  using: composite
  steps:
    - name: Cleanup runner
      uses: open-edge-platform/geti-ci/actions/cleanup-runner@7e686c1248b3939f8ee8e04e2612da727e379d91
      with:
        type: all

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build Docker image
      id: build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: application/docker/Dockerfile
        build-contexts: |
          libs=library
        target: physical-ai-studio-${{ inputs.device }}
        platforms: linux/amd64
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
        # When not pushing, load the image into the local Docker daemon so
        # callers can run smoke tests or inspect image size.
        load: ${{ inputs.push != 'true' }}
        build-args: GIT_SHA=${{ github.sha }}
        # Disable all caching (local and remote) when use-cache=false to
        # ensure reproducible builds for RC/release without any cached layers.
        no-cache: ${{ inputs.use-cache != 'true' }}
        # Registry-based cache: each device variant gets its own cache
        # image in GHCR, avoiding the 10 GB GHA cache limit that caused
        # cache thrashing across cpu/xpu/cuda scopes (~18-20 GB total).
        # The caller must log in to ghcr.io before invoking this action.
        # Cache reads always work (public packages); writes require
        # packages:write which fork PRs do not have.
        # Cache is disabled for RC/release builds (use-cache=false)
        # to prevent cache poisoning and ensure reproducible builds.
        cache-from: ${{ inputs.use-cache == 'true' && format('type=registry,ref=ghcr.io/open-edge-platform/physical-ai-studio-{0}:buildcache', inputs.device) || '' }}
        cache-to: ${{ inputs.cache-write == 'true' && inputs.use-cache == 'true' && format('type=registry,ref=ghcr.io/open-edge-platform/physical-ai-studio-{0}:buildcache,mode=max,compression=zstd,image-manifest=true,ignore-error=true', inputs.device) || '' }}

    - name: Extract first image tag
      id: first-tag
      if: inputs.push != 'true'
      shell: bash
      env:
        IMAGE_TAGS: ${{ inputs.tags }}
      run: |
        # Grab the first tag from the newline-separated list
        FIRST_TAG=$(echo "${IMAGE_TAGS}" | head -n1)
        echo "name=${FIRST_TAG}" >> "$GITHUB_OUTPUT"
