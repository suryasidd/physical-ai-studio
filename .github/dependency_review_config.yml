fail-on-severity: "low"
comment-summary-in-pr: on-failure
deny-licenses:
  - GPL-1.0-only
  - GPL-1.0-or-later
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-2.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - GPL-3.0
  - AGPL-1.0-only
  - AGPL-1.0-or-later
  - AGPL-1.0
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - AGPL-3.0
allow-dependencies-licenses:
  # gitdb distribution license is BSD License, as declared in the PyPI,
  # see https://pypi.org/pypi/gitdb/json
  # The GPL-1.0-or-later entry in the SBOM is a scanner false positive
  - pkg:pypi/gitdb
  # aiohappyeyeballs distribution license is PSF-2.0, as declared in the PyPI,
  # see https://pypi.org/pypi/aiohappyeyeballs/json
  # The GPL-1.0-or-later entry in the SBOM is a scanner false positive
  - pkg:pypi/aiohappyeyeballs
  # typing-extensions distribution license is PSF-2.0, as declared in the PyPI,
  # see https://pypi.org/pypi/typing-extensions/json
  # The GPL-1.0-or-later entry in the SBOM is a scanner false positive
  - pkg:pypi/typing-extensions
  # python-xlib distribution license is LGPLv2+, as declared in the PyPI,
  # see https://pypi.org/pypi/python-xlib/json
  # The GPL-3.0-or-later entry in the SBOM is a scanner false positive
  - pkg:pypi/python-xlib
license-check: true
vulnerability-check: true
allow-ghsas:
  # GHSA-rrmf-rvhw-rf47 (CVE-2025-3000): torch.jit.script memory corruption.
  # No patched torch release exists yet (low severity, requires local
  # attacker-controlled TorchScript input). Re-evaluate when upstream ships
  # a fix. See https://github.com/advisories/GHSA-rrmf-rvhw-rf47
  - GHSA-rrmf-rvhw-rf47
